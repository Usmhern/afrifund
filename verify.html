<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DATA CENTER</title>

<style>

*{
box-sizing:border-box;
}

body{
margin:0;
padding:0;
background:white;
font-family:Arial, sans-serif;
}

.menu-container{
position:fixed;
top:10px;
right:10px;
z-index:1000;
}

.dots{
cursor:pointer;
width:30px;
height:24px;
display:flex;
flex-direction:column;
justify-content:space-between;
align-items:center;
padding:6px 0;
}

.dots div{
width:5px;
height:5px;
background:#333;
border-radius:50%;
}

.dropdown{
display:none;
position:absolute;
top:35px;
right:0;
background:white;
border:1px solid #ccc;
box-shadow:0 4px 6px rgba(0,0,0,0.1);
border-radius:5px;
overflow:hidden;
min-width:120px;
}

.dropdown a{
display:block;
padding:10px;
text-decoration:none;
color:black;
}

.dropdown a:hover{
background:#f2f2f2;
}

#records{
padding:20px;
max-width:900px;
margin:auto;
text-align:center;
}

h2{
color:darkblue;
margin-top:40px;
}

.spinner{
border:4px solid #f3f3f3;
border-top:4px solid darkblue;
border-radius:50%;
width:30px;
height:30px;
animation:spin 1s linear infinite;
margin:auto;
margin-top:40px;
}

@keyframes spin{
0%{transform:rotate(0deg);}
100%{transform:rotate(360deg);}
}

table{
border-collapse:collapse;
width:100%;
margin-top:20px;
background:white;
box-shadow:0 2px 6px rgba(0,0,0,0.2);
}

th,td{
border:1px solid darkblue;
padding:10px;
text-align:center;
}

th{
background:darkblue;
color:white;
}

</style>
</head>

<body>

<div class="menu-container">
<div class="dots" onclick="toggleMenu()">
<div></div>
<div></div>
<div></div>
</div>

<div class="dropdown" id="menuDropdown">
<a href="index.html">Dashboard</a>
<a href="#">About</a>
<a href="#">Settings</a>
</div>
</div>

<div id="records">

<h2>ALL RECORDS</h2>

<div id="loader" class="spinner"></div>

<div id="tableContainer"></div>

<p id="result"></p>

</div>


<script>

let globalData=[];

/* MENU */

function toggleMenu(){

const dropdown=document.getElementById('menuDropdown');

dropdown.style.display=
dropdown.style.display==="block"?"none":"block";

}

window.onclick=function(e){

const menu=document.getElementById('menuDropdown');
const dots=document.querySelector('.dots');

if(!dots.contains(e.target)&&!menu.contains(e.target)){
menu.style.display="none";
}

};



/* AUTO FETCH WHEN PAGE LOADS */

window.onload=function(){

fetchRecords();

};



function fetchRecords(){

const loader=document.getElementById("loader");
const tableContainer=document.getElementById("tableContainer");
const result=document.getElementById("result");

loader.style.display="block";

fetch("https://script.google.com/macros/s/AKfycbwj9btvDnEfNASlRjYIlWEhGEmhY3XHdRkuOMEiCtLqOjnM8jrE45qkmX7trqiA09hO/exec")

.then(res=>res.json())

.then(data=>{

globalData=data;

if(!Array.isArray(data)||data.length===0){

tableContainer.innerHTML="<p>No records found</p>";

return;

}

let headers=Object.keys(data[0]);

let html="<table>";

html+="<tr><th>SN</th>";

headers.forEach(h=>{
html+=`<th>${h}</th>`;
});

html+="</tr>";

data.forEach((row,i)=>{

html+=`<tr><td>${i+1}</td>`;

headers.forEach(h=>{
html+=`<td>${row[h]||""}</td>`;
});

html+="</tr>";

});

html+="</table>";

tableContainer.innerHTML=html;

})

.catch(()=>{

result.innerText="❌ Error loading records";

})

.finally(()=>{

loader.style.display="none";

});

}

</script>

</body>
</html>
