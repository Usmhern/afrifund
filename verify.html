<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LOGIN</title>

<style>
*{box-sizing:border-box;}

body{
margin:0;
padding:0;
background:orange;
font-family:Arial;
}

.menu-container{
position:fixed;
top:10px;
right:10px;
z-index:1000;
}

.dots{
cursor:pointer;
width:30px;
height:24px;
display:flex;
flex-direction:column;
justify-content:space-between;
align-items:center;
padding:6px 0;
}

.dots div{
width:5px;
height:5px;
background:#333;
border-radius:50%;
}

.dropdown{
display:none;
position:absolute;
top:35px;
right:0;
background:white;
border:1px solid #ccc;
box-shadow:0 4px 6px rgba(0,0,0,0.1);
border-radius:5px;
overflow:hidden;
min-width:120px;
}

.dropdown a{
display:block;
padding:10px;
text-decoration:none;
color:black;
}

.dropdown a:hover{
background:#f2f2f2;
}

#login,#records{
padding:20px;
width:100%;
max-width:500px;
margin:auto;
text-align:center;
}

h2{
color:navy;
margin-top:50px;
}

input[type=password]{
width:100%;
padding:12px;
font-size:18px;
text-align:center;
margin-top:30px;
border:none;
border-bottom:2px solid black;
background:transparent;
outline:none;
}

button{
background:darkgreen;
color:#fff;
border-radius:20px;
width:160px;
height:45px;
border:none;
font-weight:bold;
cursor:pointer;
margin-top:30px;
position:relative;
}

.spinner{
border:3px solid #f3f3f3;
border-top:3px solid white;
border-radius:50%;
width:18px;
height:18px;
animation:spin 0.8s linear infinite;
position:absolute;
top:13px;
left:42%;
display:none;
}

@keyframes spin{
0%{transform:rotate(0deg);}
100%{transform:rotate(360deg);}
}

table{
border-collapse:collapse;
width:100%;
margin-top:20px;
background:white;
box-shadow:0 2px 5px grey;
}

th,td{
border:1px solid darkblue;
padding:8px;
text-align:center;
}

th{
background:darkblue;
color:white;
}

#records{display:none;}

</style>
</head>

<body>

<div class="menu-container">
<div class="dots" onclick="toggleMenu()">
<div></div>
<div></div>
<div></div>
</div>

<div class="dropdown" id="menuDropdown">
<a href="index.html">Dashboard</a>
<a href="#">About</a>
<a href="verify.html">Admin</a>
<a href="#">Settings</a>
</div>
</div>


<!-- LOGIN -->

<div id="login">
<h2>DATA CENTER</h2>

<form id="verifyForm">
<input type="password" name="otp" placeholder="Enter Code" required maxlength="8">

<button type="submit" id="verifyBtn">
<span id="btnText">Login</span>
<div class="spinner" id="loader"></div>
</button>

<p id="result"></p>

</form>
</div>


<!-- RECORDS -->

<div id="records">

<h2>ALL RECORDS</h2>

<button id="fetchBtn">
<span id="btnText2">Fetch Records</span>
<div class="spinner" id="loader2"></div>
</button>

<div id="tableContainer"></div>
<p id="result2"></p>

</div>


<script>

let globalData=[];

/* MENU */

function toggleMenu(){
const dropdown=document.getElementById('menuDropdown');
dropdown.style.display=dropdown.style.display==="block"?"none":"block";
}

window.onclick=function(e){
const menu=document.getElementById('menuDropdown');
const dots=document.querySelector('.dots');

if(!dots.contains(e.target)&&!menu.contains(e.target)){
menu.style.display="none";
}
};


/* OTP LOGIN */

document.getElementById("verifyForm").addEventListener("submit",function(e){

e.preventDefault();

const otp=this.otp.value;

const loader=document.getElementById("loader");
const btnText=document.getElementById("btnText");
const button=document.getElementById("verifyBtn");
const result=document.getElementById("result");

loader.style.display="block";
btnText.style.visibility="hidden";
button.disabled=true;

fetch(`https://script.google.com/macros/s/AKfycbwj9btvDnEfNASlRjYIlWEhGEmhY3XHdRkuOMEiCtLqOjnM8jrE45qkmX7trqiA09hO/exec?otp=${otp}`)

.then(res=>res.text())

.then(data=>{

result.innerText=data;

if(data.includes("✅")){

result.style.color="green";

document.getElementById("login").style.display="none";
document.getElementById("records").style.display="block";

}else{

result.style.color="red";

}

})

.catch(()=>{

result.innerText="❌ Error verifying";
result.style.color="red";

})

.finally(()=>{

loader.style.display="none";
btnText.style.visibility="visible";
button.disabled=false;

});

});



/* FETCH RECORDS */

document.getElementById("fetchBtn").addEventListener("click",fetchRecords);


function fetchRecords(){

const loader=document.getElementById("loader2");
const btnText=document.getElementById("btnText2");
const button=document.getElementById("fetchBtn");

loader.style.display="block";
btnText.style.visibility="hidden";
button.disabled=true;

fetch("https://script.google.com/macros/s/AKfycbwj9btvDnEfNASlRjYIlWEhGEmhY3XHdRkuOMEiCtLqOjnM8jrE45qkmX7trqiA09hO/exec")

.then(res=>res.json())

.then(data=>{

globalData=data;

if(!Array.isArray(data)||data.length===0){

document.getElementById("tableContainer").innerHTML="No records found";

return;

}

let headers=Object.keys(data[0]);

let html="<table><tr><th>SN</th>";

headers.forEach(h=>{
html+=`<th>${h}</th>`;
});

html+="</tr>";

data.forEach((row,i)=>{

html+=`<tr><td>${i+1}</td>`;

headers.forEach(h=>{

html+=`<td>${row[h]||""}</td>`;

});

html+="</tr>";

});

html+="</table>";

document.getElementById("tableContainer").innerHTML=html;

})

.catch(()=>{

document.getElementById("result2").innerText="❌ Error loading records";

})

.finally(()=>{

loader.style.display="none";
btnText.style.visibility="visible";
button.disabled=false;

});

}

</script>

</body>
</html>
